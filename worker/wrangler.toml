name = "chenxi-api"
main = "index.js"
compatibility_date = "2024-09-01"

# D1 数据库（部署前需创建）：
# wrangler d1 create chenxi-db
# 然后把下面的 database_id 替换为你的实际 ID
[[d1_databases]]
binding = "DB"
database_name = "chenxi-db"
database_id = "59881fe5-302f-4aba-9f16-557bf5c18a23"

# KV 存验证码、限流
# wrangler kv:namespace create CODES
[[kv_namespaces]]
binding = "CODES"
id = "fe888f22bfad4874a9f4a0b1a8c0ee1b"

# 环境变量（敏感的用 wrangler secret put）：
# wrangler secret put RESEND_API_KEY
# wrangler secret put ADMIN_EMAIL
# wrangler secret put SESSION_SECRET
[vars]
FROM_EMAIL = "onboarding@resend.dev"   # Resend 免费默认发件邮箱（之后绑域名可改）
SITE_URL   = "https://poud666.github.io/chenxi-finance"
PRICE_CNY  = "10"
