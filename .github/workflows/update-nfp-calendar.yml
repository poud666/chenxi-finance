name: Update NFP Release Calendar

on:
  schedule:
    # Check the BLS schedule on the 1st of every month in Hong Kong time.
    - cron: "10 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update calendar from BLS schedule
        run: python scripts/update_nfp_release_dates.py

      - name: Update consensus expectations
        run: python scripts/update_nfp_expectations.py

      - name: Commit calendar and expectations update
        shell: bash
        run: |
          if git diff --quiet -- .github/nfp_release_dates.json .github/nfp_expectations.json; then
            echo "NFP calendar and expectations already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/nfp_release_dates.json .github/nfp_expectations.json
          git commit -m "chore: update NFP calendar and expectations"
          git push
