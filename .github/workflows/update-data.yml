name: 更新指标数据

on:
  schedule:
    # 每 15 分钟跑一次（GitHub Actions cron 最小粒度 5 分钟，但建议 15 分钟以上稳定）
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'fetch_data.py'
      - '.github/workflows/update-data.yml'

# 防止并发执行
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install requests

      - name: 抓取指标
        run: python fetch_data.py

      - name: 提交并推送（如有变化）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore(data): 更新指标 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
