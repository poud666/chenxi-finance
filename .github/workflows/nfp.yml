name: NFP BLS Monitor

on:
  schedule:
    # 20:28 Asia/Hong_Kong = 12:28 UTC. The calendar is refreshed
    # on the 1st; this workflow only monitors when the refreshed
    # calendar says today is the real BLS release date.
    - cron: "28 12 1-8 * *"
  workflow_dispatch:
    inputs:
      target_release:
        description: 'Optional target release, for example "June 2026"'
        required: false
        default: ""
      expected_payrolls_k:
        description: "Consensus NFP forecast in thousands"
        required: false
        default: ""
      expected_unemployment:
        description: "Consensus unemployment-rate forecast, percent"
        required: false
        default: ""
      expected_ahe_mom:
        description: "Consensus average hourly earnings MoM forecast, percent"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      is_release_day: ${{ steps.calendar.outputs.is_release_day }}
      target_release: ${{ steps.calendar.outputs.target_release }}
      expected_payrolls_k: ${{ steps.expectations.outputs.expected_payrolls_k }}
      expected_unemployment: ${{ steps.expectations.outputs.expected_unemployment }}
      expected_ahe_mom: ${{ steps.expectations.outputs.expected_ahe_mom }}
      expectations_source: ${{ steps.expectations.outputs.expectations_source }}
      expectations_reference_month: ${{ steps.expectations.outputs.expectations_reference_month }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: calendar
        run: python scripts/is_nfp_release_day.py --github-output "$GITHUB_OUTPUT"

      - id: expectations
        if: github.event_name == 'workflow_dispatch' || steps.calendar.outputs.is_release_day == 'true'
        run: |
          target="${{ github.event.inputs.target_release || steps.calendar.outputs.target_release }}"
          if [ -z "$target" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/read_nfp_expectations.py --target-release "$target" --github-output "$GITHUB_OUTPUT"

  monitor:
    needs: gate
    if: github.event_name == 'workflow_dispatch' || needs.gate.outputs.is_release_day == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore NFP state
        uses: actions/cache@v4
        with:
          path: state/
          key: nfp-state-${{ github.run_id }}
          restore-keys: |
            nfp-state-

      - name: Build command
        id: command
        shell: bash
        run: |
          target="${{ github.event.inputs.target_release || needs.gate.outputs.target_release }}"
          payrolls="${{ github.event.inputs.expected_payrolls_k || needs.gate.outputs.expected_payrolls_k || vars.NFP_EXPECTED_PAYROLLS_K }}"
          unemployment="${{ github.event.inputs.expected_unemployment || needs.gate.outputs.expected_unemployment || vars.NFP_EXPECTED_UNEMPLOYMENT }}"
          ahe_mom="${{ github.event.inputs.expected_ahe_mom || needs.gate.outputs.expected_ahe_mom || vars.NFP_EXPECTED_AHE_MOM }}"

          args=(python nfp_monitor.py --watch --only-new --interval-seconds 5 --timeout-seconds 1200)

          if [ -n "$target" ]; then
            args+=(--target-release "$target")
          fi
          if [ -n "$payrolls" ]; then
            args+=(--expected-payrolls-k "$payrolls")
          fi
          if [ -n "$unemployment" ]; then
            args+=(--expected-unemployment "$unemployment")
          fi
          if [ -n "$ahe_mom" ]; then
            args+=(--expected-ahe-mom "$ahe_mom")
          fi

          printf '%q ' "${args[@]}" > command.txt
          echo >> command.txt

      - name: Run NFP monitor
        shell: bash
        run: bash -lc "$(cat command.txt)"

      - name: Create GitHub notification issue
        shell: bash
        run: |
          raw_file="$(ls -t outputs/nfp-raw-*.md | head -n 1)"
          analysis_file="$(ls -t outputs/nfp-analysis-*.md | head -n 1)"
          title="NFP Alert: $(date -u +'%Y-%m-%d %H:%M UTC')"

          issue_url="$(gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --body-file "$raw_file")"

          gh issue comment "$issue_url" --repo "$GITHUB_REPOSITORY" --body-file "$analysis_file"
          echo "Created NFP notification issue: $issue_url"

      - name: Upload NFP output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfp-output-${{ github.run_id }}
          path: |
            outputs/
            state/
          if-no-files-found: ignore
