<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 股市预警</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">◉</span>
      <span class="logo-text">股市预警 · 后台</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html">仪表盘</a>
      <a href="admin.html" style="color:var(--text)">订单管理</a>
    </div>
  </div>
</nav>

<main class="page">
  <div class="container">

    <div class="page-head">
      <h1>📬 订单审核</h1>
      <p>核对支付到账后点击通过，用户将自动开通订阅 + 收到通知邮件</p>
    </div>

    <div id="no-access" class="panel" style="display:none;text-align:center;padding:60px 20px">
      <h3>无权限</h3>
      <p style="color:var(--text-soft)">此页面仅管理员可访问</p>
      <button class="btn-primary" onclick="openLoginModal(()=>location.reload())" style="margin-top:14px">登录</button>
    </div>

    <div id="admin-area" style="display:none">
      <!-- 切换 -->
      <div class="panel" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <span style="color:var(--text-mute);font-size:.85rem">查看：</span>
        <button onclick="loadOrders('pending')"  class="btn-ghost btn-sm tab-btn active" data-tab="pending">待审核</button>
        <button onclick="loadOrders('approved')" class="btn-ghost btn-sm tab-btn" data-tab="approved">已通过</button>
        <button onclick="loadOrders('rejected')" class="btn-ghost btn-sm tab-btn" data-tab="rejected">已拒绝</button>
        <span style="flex:1"></span>
        <button onclick="loadOrders()" class="btn-ghost btn-sm">⟳ 刷新</button>
      </div>

      <div class="panel">
        <table class="tbl">
          <thead>
            <tr>
              <th>下单时间</th>
              <th>邮箱</th>
              <th>方式</th>
              <th>金额</th>
              <th>用户备注</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="admin-tbody">
            <tr><td colspan="7" style="color:var(--text-mute);text-align:center;padding:30px">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script src="app.js"></script>
<script>
let currentTab = 'pending';

async function init() {
  const user = await loadUser();
  if (!user || !user.is_admin) {
    document.getElementById('no-access').style.display = '';
    return;
  }
  document.getElementById('admin-area').style.display = '';
  loadOrders('pending');
}

async function loadOrders(status) {
  if (status) {
    currentTab = status;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === status);
    });
  }
  const tbody = document.getElementById('admin-tbody');
  tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-mute);text-align:center;padding:30px">加载中...</td></tr>';

  try {
    const { orders } = await Admin.list(currentTab);
    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:var(--text-mute);text-align:center;padding:30px">暂无${{pending:'待审核',approved:'已通过',rejected:'已拒绝'}[currentTab]}订单</td></tr>`;
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="font-size:.85rem;color:var(--text-soft)">${new Date(o.created_at).toLocaleString('zh-CN')}</td>
        <td><b>${o.email}</b></td>
        <td>${o.payment_method === 'alipay' ? '💙 支付宝' : '💚 微信'}</td>
        <td><b style="color:var(--accent)">¥${o.amount}</b></td>
        <td style="color:var(--text-soft);font-size:.85rem;max-width:200px;overflow:hidden;text-overflow:ellipsis">${o.user_note || '—'}</td>
        <td><span class="badge badge-${o.status}">${{pending:'待审核',approved:'已通过',rejected:'已拒绝'}[o.status]}</span></td>
        <td>
          ${o.status === 'pending' ? `
            <button onclick="approve('${o.id}')" class="btn-primary btn-sm" style="margin-right:6px">✓ 通过</button>
            <button onclick="reject('${o.id}')" class="btn-ghost btn-sm">拒绝</button>
          ` : `<span style="color:var(--text-mute);font-size:.85rem">${o.admin_note || '—'}</span>`}
        </td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="color:var(--red);padding:30px;text-align:center">${e.message}</td></tr>`;
  }
}

async function approve(id) {
  const note = prompt('管理员备注（选填，会显示给用户）：') || '';
  try {
    await Admin.approve(id, note);
    alert('✅ 已审核通过');
    loadOrders();
  } catch (e) { alert('失败：' + e.message); }
}

async function reject(id) {
  const note = prompt('拒绝原因：');
  if (note === null) return;
  try {
    await Admin.reject(id, note);
    alert('已拒绝');
    loadOrders();
  } catch (e) { alert('失败：' + e.message); }
}

document.addEventListener('DOMContentLoaded', init);
</script>

<style>
.tab-btn.active {
  background: var(--accent);
  color: #1a1410;
  border-color: var(--accent);
}
</style>

</body>
</html>
